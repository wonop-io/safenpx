name: Bug
description: Report incorrect behavior.
title: "[Bug]: "
labels: ["type:bug", "status:triage"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include command, package spec, platform, and output.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What workflow or safety guarantee is affected?
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What test, fixture, policy check, or command should prove the fix?
    validations:
      required: true
