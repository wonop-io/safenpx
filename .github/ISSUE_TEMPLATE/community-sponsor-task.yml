name: Community or sponsor task
description: Track public roadmap, contributor, sponsor, or outreach work.
title: "[Community]: "
labels: ["type:community", "status:triage"]
body:
  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Contributors, package managers, agent vendors, AI labs, sponsors, or users.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: textarea
    id: issue-workflow
    attributes:
      label: Issue workflow impact
      description: Does this affect roadmap, templates, labels, contributor docs, or project fields?
