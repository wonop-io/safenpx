name: Feature
description: Propose product or implementation work.
title: "[Feature]: "
labels: ["type:feature", "status:triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be included and excluded?
    validations:
      required: true
  - type: dropdown
    id: track
    attributes:
      label: Track
      options:
        - CLI
        - Artifact
        - Execution
        - Policy
        - Fixtures
        - Security
        - Docs
        - Community
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Proof obligation
      description: What must be proven, refused, or kept fail-closed?
    validations:
      required: true
  - type: textarea
    id: fixtures
    attributes:
      label: Fixtures and tests
      description: What fixture, golden output, policy gate, or test coverage is required?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be done?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: What can go wrong if this is implemented poorly?
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Which docs, README sections, or index files need updates?
  - type: input
    id: exit-code
    attributes:
      label: Exit-code behavior
      description: If relevant, which decision and exit code should result?
